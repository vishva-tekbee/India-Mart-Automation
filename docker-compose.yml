services:
  api:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://mongo:27017

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
